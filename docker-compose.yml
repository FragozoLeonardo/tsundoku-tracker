services:
  db:
    image: postgres:16-alpine
    container_name: tsundoku-tracker-db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      args:
        - BUNDLE_WITHOUT=""
    container_name: tsundoku-tracker-web
    command: sleep infinity
    volumes:
      - .:/rails
      - bundle_data:/usr/local/bundle
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=db
      - BUNDLE_WITHOUT=""
      - BUNDLE_DEPLOYMENT=0
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  bundle_data: